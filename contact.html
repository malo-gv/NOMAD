<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - NOMAD</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="container">
        <img id="logo" src="images/NOMAD LOGO.png" alt="Logo NOMAD" >
        <nav>
            <ul>
                <li><a class="navHead" href="accueil.html">Accueil</a></li>
                <li><a class="navHead" href="">Notre mission</a></li>
                <li><a class="navHead" href="">Destinations</a></li>
                <li><a class="navHead" href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </div>
</header>

<main>
    <section class="contact-form">
        <h1>Contactez-nous</h1>
        <p>Une question, une idée ou un partenariat ? On vous écoute !</p>

        <form action="#" method="post">
            <label for="name">Nom</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required></textarea>

            <button type="submit" class="btn">Envoyer le message</button>
        </form>
    </section>
</main>


<footer>
    <div>
        <p id="bas">2025 NOMAD. Malo GAVARD - Yéléna Sainte-Rose. Tous droits réservés.</p>
    </div>
</footer>
</body>
</html>
